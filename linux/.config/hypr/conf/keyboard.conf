# -----------------------------------------------------
# Keyboard Layout
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    numlock_by_default = true
    follow_mouse = 0
    mouse_refocus = false
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = false       # disable tap-as-click; use physical press only
    }
    sensitivity = 0
}

# --- Per-device overrides (oz, 2026-04-13) ---
# Synaptics touchpad: hard-disable tap-to-click so palm/finger taps
# during typing never reposition the text cursor.
device {
    name = synps/2-synaptics-touchpad
    tap-to-click = false
    disable_while_typing = true
    natural_scroll = true
}

# TrackPoint: the nub between G/H/B gets nudged while typing and drifts
# the pointer toward center-screen. Lower its sensitivity significantly.
# Set to 0 to disable entirely if you never use it.
device {
    name = tpps/2-elan-trackpoint
    sensitivity = -0.7
}
