# Delay the plugin load to ensure the compositor is ready
exec-once = sleep 1 && hyprpm reload

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current
        
        # This fixes your "11 blank desktops" issue
        skip_empty = true

        # Correct 2026 gesture syntax:
        # [fingers], [direction], [action]
        hyprexpo-gesture = 3, vertical, expo
    }
}

# Voice Input - SUPER+V (double tap for Fn not supported directly)
bind = $mainMod CTRL, V, exec, ~/.config/hypr/scripts/voice-input.sh


# Syncthing tray (Syncthing daemon managed by systemd user service)
exec-once = sleep 3 && syncthingtray-qt6
