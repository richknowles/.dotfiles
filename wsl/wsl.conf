# /etc/wsl.conf - WSL configuration
# Copy this to /etc/wsl.conf in your WSL distro (requires sudo)
# Then restart WSL: wsl --shutdown (from PowerShell)

[boot]
# Run commands at WSL startup
systemd=true

[automount]
# Auto-mount Windows drives
enabled=true
root=/mnt/
options="metadata,umask=22,fmask=11"

[network]
# Network settings
generateHosts=true
generateResolvConf=true
hostname=P15

[interop]
# Windows interop
enabled=true
appendWindowsPath=true

[user]
# Default user when launching WSL
default=rich
